# ─────────────────────────────────────────────────────────────
# MercadoX — Entrega Continua (CD)
# Se ejecuta SOLO cuando el workflow de CI pasa exitosamente
# en la rama main. Valida el JAR y dispara el deploy en Render.
#
# Render construye la imagen Docker usando el Dockerfile del repo
# (multi-stage: eclipse-temurin:21-jdk-alpine → jre-alpine).
#
# Secret requerido en GitHub → Settings → Secrets:
#   RENDER_DEPLOY_HOOK_URL  → Deploy Hook de tu servicio en Render
#                             (Render Dashboard → Service → Settings → Deploy Hook)
#
# Variables de entorno a configurar en el servicio de Render:
#   DB_URL                    jdbc:mysql://<host>:3306/mercadox?useSSL=false&allowPublicKeyRetrieval=true
#   DB_USERNAME               usuario de MySQL
#   DB_PASSWORD               contraseña de MySQL
#   JWT_SECRET                clave secreta JWT (base64, mínimo 32 bytes)
#   CLOUDINARY_CLOUD_NAME     cloud name de Cloudinary
#   CLOUDINARY_API_KEY        API key de Cloudinary
#   CLOUDINARY_API_SECRET_KEY API secret de Cloudinary
#   SENDGRID_API_KEY          API key de SendGrid
#   PORT                      Render lo inyecta automáticamente (no configurar)
# ─────────────────────────────────────────────────────────────
name: CD — Deploy to Render

on:
  workflow_run:
    workflows: [ "CI - Build & Test — Mercadox" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Valida que el JAR compila antes de decirle a Render que despliegue
      - name: Construir JAR de producción
        run: mvn package -B --no-transfer-progress -DskipTests

      # Render clona el repo y construye la imagen desde el Dockerfile
      - name: Disparar deploy en Render
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render respondió HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Error al disparar el deploy (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Resumen del despliegue
        run: |
          echo "## Despliegue completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plataforma:** Render (Docker — eclipse-temurin:21-jre-alpine)" >> $GITHUB_STEP_SUMMARY
          echo "- **Estado:** Deploy disparado exitosamente" >> $GITHUB_STEP_SUMMARY
