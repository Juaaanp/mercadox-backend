# ─────────────────────────────────────────────────────────────
# MercadoX — Entrega Continua (CD)
# Se ejecuta SOLO cuando el workflow de CI pasa exitosamente
# en la rama main. Construye el JAR y despliega a Railway.
#
# Secrets requeridos en GitHub → Settings → Secrets:
#   RAILWAY_TOKEN  →  token de tu proyecto en Railway
# ─────────────────────────────────────────────────────────────
name: CD — Deploy to Railway

on:
  workflow_run:
    workflows: [ "CI — Build & Test" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Deploy a Railway
    runs-on: ubuntu-latest
    # Solo despliega si CI pasó (no si falló)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # 1. Obtener el código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Java 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Maven
      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Construir el JAR de producción (sin correr tests, ya pasaron en CI)
      - name: Construir JAR de producción
        run: mvn package -B --no-transfer-progress -DskipTests

      # 5. Instalar Railway CLI
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      # 6. Desplegar a Railway
      - name: Desplegar a Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach

      # 7. Notificar resultado del despliegue en el resumen del workflow
      - name: Resumen del despliegue
        run: |
          echo "## Despliegue completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plataforma:** Railway" >> $GITHUB_STEP_SUMMARY
          echo "- **Estado:** Exitoso" >> $GITHUB_STEP_SUMMARY
