# ─────────────────────────────────────────────────────────────
# MercadoX — Integración Continua (CI)
# Se ejecuta en cada push y pull request a main y develop.
# Pasos: compilar → pruebas unitarias → reporte de cobertura.
# ─────────────────────────────────────────────────────────────
name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build y pruebas unitarias
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Java 21 (Temurin = OpenJDK gratuito)
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache de dependencias Maven (acelera builds siguientes)
      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Compilar el proyecto
      - name: Compilar con Maven
        run: mvn compile -B --no-transfer-progress

      # 5. Ejecutar pruebas unitarias
      - name: Ejecutar pruebas unitarias (JUnit 5)
        run: mvn test -B --no-transfer-progress

      # 6. Publicar reporte de cobertura JaCoCo como artefacto
      - name: Publicar reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      # 7. Publicar resultados de pruebas (visible en la UI de GitHub)
      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
