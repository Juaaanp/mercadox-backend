name: CI - Build & Test — Mercadox

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Pruebas Unitarias (JUnit 5 + Mockito)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
              java-version: '21'
              distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v5
        with:
              path: ~/.m2/repository
              key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
              restore-keys: ${{ runner.os }}-maven-

      - name: Compilar proyecto
        run: mvn compile -B --no-transfer-progress

      - name: Ejecutar pruebas unitarias
        run: mvn test -B --no-transfer-progress
        env:
            SPRING_PROFILES_ACTIVE: test
            JWT_SECRET: test-secret-key-for-ci-minimum-32-bytes

      - name: Publicar reporte Surefire
        uses: actions/upload-artifact@v4
        if: always()
        with:
                name: surefire-unit-tests
                path: target/surefire-reports/
                retention-days: 7
                if-no-files-found: warn   # ← no falla si no hay archivos


  integration-tests:
    name: Pruebas de Integración (MockMvc + H2)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Ejecutar pruebas de integración
        run: mvn verify -B --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test-secret-key-for-ci-minimum-32-bytes
          SENDGRID_API_KEY: test-key-not-used-in-tests

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7